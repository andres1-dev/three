<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Notificaciones Push Supabase</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .status {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      color: #666;
      font-size: 14px;
    }

    .status-value {
      font-weight: 600;
      color: #333;
    }

    .status-value.granted {
      color: #4caf50;
    }

    .status-value.denied {
      color: #f44336;
    }

    .status-value.default {
      color: #ff9800;
    }

    .button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .button:active {
      transform: translateY(0);
    }

    .button-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .button-secondary {
      background: #f5f5f5;
      color: #333;
    }

    .button-danger {
      background: #f44336;
      color: white;
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .log {
      background: #1e1e1e;
      color: #00ff00;
      border-radius: 10px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 30px;
    }

    .log-entry {
      margin-bottom: 5px;
    }

    .log-entry.error {
      color: #ff5555;
    }

    .log-entry.success {
      color: #50fa7b;
    }

    .log-entry.info {
      color: #8be9fd;
    }

    .config-section {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .config-section h3 {
      color: #856404;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .config-section input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 10px;
    }

    .config-section small {
      color: #856404;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔔 Test Push Notifications</h1>
    <p class="subtitle">Sistema de notificaciones push con Supabase (sin Firebase)</p>

    <!-- Configuración -->
    <div class="config-section">
      <h3>⚙️ Configuración</h3>
      <input type="text" id="supabase-url" placeholder="https://tu-proyecto.supabase.co">
      <input type="text" id="supabase-key" placeholder="Supabase Anon Key">
      <input type="text" id="vapid-key" placeholder="VAPID Public Key">
      <small>Completa estos campos antes de inicializar</small>
    </div>

    <!-- Estado -->
    <div class="status">
      <div class="status-item">
        <span class="status-label">Soporte del navegador:</span>
        <span class="status-value" id="support-status">-</span>
      </div>
      <div class="status-item">
        <span class="status-label">Permiso:</span>
        <span class="status-value" id="permission-status">-</span>
      </div>
      <div class="status-item">
        <span class="status-label">Suscripción:</span>
        <span class="status-value" id="subscription-status">-</span>
      </div>
      <div class="status-item">
        <span class="status-label">Service Worker:</span>
        <span class="status-value" id="sw-status">-</span>
      </div>
    </div>

    <!-- Botones -->
    <button class="button button-primary" id="init-btn">1. Inicializar Sistema</button>
    <button class="button button-primary" id="request-btn" disabled>2. Solicitar Permisos</button>
    <button class="button button-secondary" id="test-btn" disabled>3. Enviar Notificación de Prueba</button>
    <button class="button button-danger" id="unsubscribe-btn" disabled>Desuscribir</button>

    <!-- Log -->
    <div class="log" id="log"></div>
  </div>

  <!-- Scripts -->
  <script src="./js/push-supabase.js"></script>
  <script>
    const log = document.getElementById('log');
    const initBtn = document.getElementById('init-btn');
    const requestBtn = document.getElementById('request-btn');
    const testBtn = document.getElementById('test-btn');
    const unsubscribeBtn = document.getElementById('unsubscribe-btn');

    // Logging
    function addLog(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
      console.log(message);
    }

    // Actualizar estado
    function updateStatus() {
      // Soporte
      const supported = PushSupabase.isSupported();
      document.getElementById('support-status').textContent = supported ? '✅ Soportado' : '❌ No soportado';
      document.getElementById('support-status').className = `status-value ${supported ? 'granted' : 'denied'}`;

      // Permiso
      const permission = PushSupabase.getPermission();
      document.getElementById('permission-status').textContent = permission;
      document.getElementById('permission-status').className = `status-value ${permission}`;

      // Suscripción
      const subscription = PushSupabase.getSubscription();
      document.getElementById('subscription-status').textContent = subscription ? '✅ Activa' : '❌ Inactiva';
      document.getElementById('subscription-status').className = `status-value ${subscription ? 'granted' : 'denied'}`;

      // Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          const active = regs.length > 0;
          document.getElementById('sw-status').textContent = active ? '✅ Registrado' : '❌ No registrado';
          document.getElementById('sw-status').className = `status-value ${active ? 'granted' : 'denied'}`;
        });
      }

      // Habilitar/deshabilitar botones
      if (permission === 'granted' && subscription) {
        testBtn.disabled = false;
        unsubscribeBtn.disabled = false;
      } else {
        testBtn.disabled = true;
        unsubscribeBtn.disabled = true;
      }
    }

    // Inicializar
    initBtn.addEventListener('click', async () => {
      const supabaseUrl = document.getElementById('supabase-url').value;
      const supabaseKey = document.getElementById('supabase-key').value;
      const vapidKey = document.getElementById('vapid-key').value;

      if (!supabaseUrl || !supabaseKey || !vapidKey) {
        addLog('❌ Completa todos los campos de configuración', 'error');
        return;
      }

      addLog('Inicializando sistema...', 'info');

      try {
        const result = await PushSupabase.init(supabaseUrl, supabaseKey, vapidKey);
        
        if (result) {
          addLog('✅ Sistema inicializado correctamente', 'success');
          requestBtn.disabled = false;
          initBtn.disabled = true;
          updateStatus();
        } else {
          addLog('❌ Error inicializando sistema', 'error');
        }
      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
      }
    });

    // Solicitar permisos
    requestBtn.addEventListener('click', async () => {
      addLog('Solicitando permisos...', 'info');

      try {
        const result = await PushSupabase.requestPermission();
        
        if (result.success) {
          addLog('✅ Permisos concedidos y dispositivo registrado', 'success');
          updateStatus();
        } else {
          addLog(`❌ Error: ${result.error}`, 'error');
        }
      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
      }
    });

    // Enviar prueba
    testBtn.addEventListener('click', async () => {
      addLog('Enviando notificación de prueba...', 'info');

      try {
        const result = await PushSupabase.sendTest();
        
        if (result) {
          addLog('✅ Notificación de prueba enviada', 'success');
        } else {
          addLog('❌ Error enviando notificación', 'error');
        }
      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
      }
    });

    // Desuscribir
    unsubscribeBtn.addEventListener('click', async () => {
      addLog('Desuscribiendo...', 'info');

      try {
        const result = await PushSupabase.unsubscribe();
        
        if (result) {
          addLog('✅ Desuscripción exitosa', 'success');
          updateStatus();
        } else {
          addLog('❌ Error desuscribiendo', 'error');
        }
      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
      }
    });

    // Actualizar estado inicial
    updateStatus();
    addLog('Página cargada. Completa la configuración y haz clic en "Inicializar Sistema"', 'info');
  </script>
</body>
</html>
