<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Test iOS Push</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
      background: #000;
      color: #fff;
    }
    .status {
      background: #1c1c1e;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    .ok { color: #30d158; }
    .error { color: #ff453a; }
    .warning { color: #ffd60a; }
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: #0a84ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }
    .log {
      background: #1c1c1e;
      padding: 10px;
      margin-top: 20px;
      border-radius: 10px;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>🍎 Test iOS Push</h1>
  
  <div class="status">
    <strong>Dispositivo:</strong> <span id="device"></span>
  </div>
  
  <div class="status">
    <strong>Modo Standalone:</strong> <span id="standalone"></span>
  </div>
  
  <div class="status">
    <strong>Service Worker:</strong> <span id="sw"></span>
  </div>
  
  <div class="status">
    <strong>Push API:</strong> <span id="push"></span>
  </div>
  
  <div class="status">
    <strong>Permiso:</strong> <span id="permission"></span>
  </div>
  
  <button onclick="testPermission()">Solicitar Permisos</button>
  <button onclick="testSubscribe()">Suscribir</button>
  
  <div class="log" id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/push-supabase.js"></script>
  
  <script>
    const log = document.getElementById('log');
    
    function addLog(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      console.log(msg);
    }

    // Detectar iOS
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
    
    document.getElementById('device').textContent = isIOS ? '✅ iOS' : '❌ No es iOS';
    document.getElementById('device').className = isIOS ? 'ok' : 'error';
    
    document.getElementById('standalone').textContent = isStandalone ? '✅ Sí (instalada)' : '❌ No (abre desde Safari)';
    document.getElementById('standalone').className = isStandalone ? 'ok' : 'error';
    
    // Service Worker
    if ('serviceWorker' in navigator) {
      document.getElementById('sw').textContent = '✅ Soportado';
      document.getElementById('sw').className = 'ok';
    } else {
      document.getElementById('sw').textContent = '❌ No soportado';
      document.getElementById('sw').className = 'error';
    }
    
    // Push API
    if ('PushManager' in window) {
      document.getElementById('push').textContent = '✅ Soportado';
      document.getElementById('push').className = 'ok';
    } else {
      document.getElementById('push').textContent = '❌ No soportado';
      document.getElementById('push').className = 'error';
    }
    
    // Permiso
    if ('Notification' in window) {
      const perm = Notification.permission;
      document.getElementById('permission').textContent = perm;
      document.getElementById('permission').className = perm === 'granted' ? 'ok' : (perm === 'denied' ? 'error' : 'warning');
    } else {
      document.getElementById('permission').textContent = 'No disponible';
      document.getElementById('permission').className = 'error';
    }

    // Configuración
    const SUPABASE_URL = 'https://doqsurxxxaudnutsydlk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvcXN1cnh4eGF1ZG51dHN5ZGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjExMDUsImV4cCI6MjA5MTI5NzEwNX0.yKcRgTad3cb2otQ7wtjkRETj3P-3THb9v8csluebALg';
    const VAPID_PUBLIC_KEY = 'MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEMUTkkkISEH7rI9lCSvaSK4uxyfpcDH_SQL5Pm663bMaOeNvLmjta8ABCz5u3cdWj8rfWl8mRxj2aMNnMSHtjQA';

    // Inicializar
    PushSupabase.init(SUPABASE_URL, SUPABASE_ANON_KEY, VAPID_PUBLIC_KEY);
    addLog('PushSupabase inicializado');

    async function testPermission() {
      addLog('Solicitando permisos...');
      
      if (!isStandalone && isIOS) {
        addLog('⚠️ IMPORTANTE: En iOS debes instalar la app primero', 'warning');
        addLog('1. Toca el botón de compartir', 'warning');
        addLog('2. Selecciona "Añadir a pantalla de inicio"', 'warning');
        addLog('3. Abre la app desde el icono', 'warning');
        return;
      }
      
      const result = await PushSupabase.requestPermission();
      
      if (result.success) {
        addLog('✅ Permisos concedidos', 'ok');
        document.getElementById('permission').textContent = 'granted';
        document.getElementById('permission').className = 'ok';
      } else {
        addLog(`❌ Error: ${result.error}`, 'error');
        if (result.message) {
          addLog(result.message, 'warning');
        }
      }
    }

    async function testSubscribe() {
      addLog('Verificando suscripción...');
      const sub = PushSupabase.getSubscription();
      
      if (sub) {
        addLog('✅ Suscripción activa', 'ok');
        addLog(`Endpoint: ${sub.endpoint.substring(0, 50)}...`);
      } else {
        addLog('❌ No hay suscripción', 'error');
      }
    }

    // Mostrar advertencia si no está en standalone
    if (isIOS && !isStandalone) {
      addLog('⚠️ ATENCIÓN: Debes instalar la app en tu pantalla de inicio', 'warning');
      addLog('Las notificaciones push en iOS solo funcionan en modo standalone', 'warning');
    }
  </script>
</body>
</html>
