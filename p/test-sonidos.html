<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Sonidos - SISPRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-label {
            color: #666;
            font-size: 14px;
        }

        .status-value {
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .status-value.success {
            background: #d4edda;
            color: #155724;
        }

        .status-value.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-value.warning {
            background: #fff3cd;
            color: #856404;
        }

        .test-section {
            margin-bottom: 30px;
        }

        .test-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .test-section h2::before {
            content: '🔊';
            font-size: 24px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .toggle-btn {
            background: #28a745;
        }

        .toggle-btn.disabled {
            background: #dc3545;
        }

        .native-test {
            background: #17a2b8;
        }

        .log-section {
            margin-top: 30px;
        }

        .log-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 4px;
        }

        .log-entry.info {
            color: #4fc3f7;
        }

        .log-entry.success {
            color: #81c784;
        }

        .log-entry.error {
            color: #e57373;
        }

        .log-entry.warning {
            color: #ffb74d;
        }

        .timestamp {
            color: #888;
            font-size: 11px;
        }

        .clear-log {
            background: #6c757d;
            padding: 8px 15px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .button-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 Test de Sonidos SISPRO</h1>
        <p class="subtitle">Diagnóstico y prueba de funcionalidad de audio</p>

        <!-- Estado del Sistema -->
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">Estado de Audio:</span>
                <span class="status-value" id="audioStatus">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Sonidos Habilitados:</span>
                <span class="status-value" id="soundEnabled">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Audio Desbloqueado:</span>
                <span class="status-value" id="audioUnlocked">No</span>
            </div>
            <div class="status-item">
                <span class="status-label">Archivos Cargados:</span>
                <span class="status-value" id="filesLoaded">0/4</span>
            </div>
        </div>

        <!-- Pruebas con sounds.js (Web Audio API) -->
        <div class="test-section">
            <h2>Web Audio API (sounds.js)</h2>
            <div class="button-grid">
                <button onclick="testChatSound()">🗨️ Chat Sound</button>
                <button onclick="testStateSound()">📊 Estado Sound</button>
                <button onclick="testToggle()" id="toggleBtn" class="toggle-btn">
                    ✅ Sonidos: ON
                </button>
            </div>
        </div>

        <!-- Pruebas Nativas (HTMLAudioElement) -->
        <div class="test-section">
            <h2>Prueba Nativa (HTMLAudioElement)</h2>
            <div class="button-grid">
                <button onclick="testNativeChat()" class="native-test">🗨️ Chat (Nativo)</button>
                <button onclick="testNativeState()" class="native-test">📊 Estado (Nativo)</button>
                <button onclick="testAllSounds()" class="native-test">🎵 Todos los Sonidos</button>
            </div>
        </div>

        <!-- Log de Eventos -->
        <div class="log-section">
            <h2>📋 Log de Eventos</h2>
            <button onclick="clearLog()" class="clear-log">Limpiar Log</button>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <!-- Cargar sistema de sonidos -->
    <script src="js/sounds.js"></script>

    <script>
        // Variables para pruebas nativas
        let nativeChatAudio = null;
        let nativeStateAudio = null;
        let nativeQuaisarAudio = null;
        let native2Audio = null;

        // Log system
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
            log('Log limpiado', 'info');
        }

        // Inicialización
        async function initTest() {
            log('🚀 Iniciando test de sonidos...', 'info');

            // Verificar Web Audio API
            if (window.AudioContext || window.webkitAudioContext) {
                log('✅ Web Audio API disponible', 'success');
            } else {
                log('❌ Web Audio API NO disponible', 'error');
            }

            // Cargar audios nativos
            try {
                nativeChatAudio = new Audio('sounds/chat.mp3');
                nativeStateAudio = new Audio('sounds/estado.mp3');
                nativeQuaisarAudio = new Audio('sounds/quaisar.mp3');
                native2Audio = new Audio('sounds/2.mp3');

                // Precargar
                await Promise.all([
                    nativeChatAudio.load(),
                    nativeStateAudio.load(),
                    nativeQuaisarAudio.load(),
                    native2Audio.load()
                ]);

                log('✅ Archivos de audio nativos cargados', 'success');
                updateFilesLoaded(4);
            } catch (e) {
                log('❌ Error cargando archivos nativos: ' + e.message, 'error');
            }

            // Verificar estado inicial
            updateStatus();

            // Listener para desbloqueo
            document.addEventListener('click', () => {
                document.getElementById('audioUnlocked').textContent = 'Sí';
                document.getElementById('audioUnlocked').className = 'status-value success';
                log('🔓 Audio desbloqueado por interacción del usuario', 'success');
            }, { once: true });

            log('✅ Test inicializado correctamente', 'success');
        }

        function updateStatus() {
            // Estado de AudioContext
            if (window.audioContext) {
                const status = document.getElementById('audioStatus');
                status.textContent = window.audioContext.state;
                status.className = 'status-value ' + 
                    (window.audioContext.state === 'running' ? 'success' : 'warning');
            }

            // Sonidos habilitados
            const enabled = window.isSoundEnabled ? window.isSoundEnabled() : true;
            const enabledEl = document.getElementById('soundEnabled');
            enabledEl.textContent = enabled ? 'Sí' : 'No';
            enabledEl.className = 'status-value ' + (enabled ? 'success' : 'error');
        }

        function updateFilesLoaded(count) {
            const filesEl = document.getElementById('filesLoaded');
            filesEl.textContent = `${count}/4`;
            filesEl.className = 'status-value ' + (count === 4 ? 'success' : 'warning');
        }

        // Tests con Web Audio API
        function testChatSound() {
            log('🎵 Reproduciendo chat.mp3 (Web Audio API)...', 'info');
            try {
                if (window.playChatSound) {
                    window.playChatSound();
                    log('✅ Chat sound ejecutado', 'success');
                } else {
                    log('❌ playChatSound() no disponible', 'error');
                }
            } catch (e) {
                log('❌ Error: ' + e.message, 'error');
            }
            updateStatus();
        }

        function testStateSound() {
            log('🎵 Reproduciendo estado.mp3 (Web Audio API)...', 'info');
            try {
                if (window.playStateSound) {
                    window.playStateSound();
                    log('✅ State sound ejecutado', 'success');
                } else {
                    log('❌ playStateSound() no disponible', 'error');
                }
            } catch (e) {
                log('❌ Error: ' + e.message, 'error');
            }
            updateStatus();
        }

        function testToggle() {
            const enabled = window.isSoundEnabled ? !window.isSoundEnabled() : false;
            if (window.toggleSound) {
                window.toggleSound(enabled);
                const btn = document.getElementById('toggleBtn');
                btn.textContent = enabled ? '✅ Sonidos: ON' : '❌ Sonidos: OFF';
                btn.className = enabled ? 'toggle-btn' : 'toggle-btn disabled';
                log(`🔄 Sonidos ${enabled ? 'activados' : 'desactivados'}`, 'info');
            }
            updateStatus();
        }

        // Tests nativos
        async function testNativeChat() {
            log('🎵 Reproduciendo chat.mp3 (Nativo)...', 'info');
            try {
                nativeChatAudio.currentTime = 0;
                await nativeChatAudio.play();
                log('✅ Chat nativo reproducido', 'success');
            } catch (e) {
                log('❌ Error nativo: ' + e.message, 'error');
            }
        }

        async function testNativeState() {
            log('🎵 Reproduciendo estado.mp3 (Nativo)...', 'info');
            try {
                nativeStateAudio.currentTime = 0;
                await nativeStateAudio.play();
                log('✅ Estado nativo reproducido', 'success');
            } catch (e) {
                log('❌ Error nativo: ' + e.message, 'error');
            }
        }

        async function testAllSounds() {
            log('🎵 Reproduciendo todos los sonidos...', 'info');
            const sounds = [
                { audio: nativeChatAudio, name: 'chat.mp3' },
                { audio: nativeStateAudio, name: 'estado.mp3' },
                { audio: nativeQuaisarAudio, name: 'quaisar.mp3' },
                { audio: native2Audio, name: '2.mp3' }
            ];

            for (const sound of sounds) {
                try {
                    sound.audio.currentTime = 0;
                    await sound.audio.play();
                    log(`✅ ${sound.name} reproducido`, 'success');
                    await new Promise(resolve => setTimeout(resolve, 1000));
                } catch (e) {
                    log(`❌ Error en ${sound.name}: ${e.message}`, 'error');
                }
            }
            log('✅ Test de todos los sonidos completado', 'success');
        }

        // Auto-init
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initTest);
        } else {
            initTest();
        }

        // Actualizar estado cada 2 segundos
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
