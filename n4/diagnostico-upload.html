<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico de Subida - SISPRO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      color: #1e293b;
      margin-bottom: 10px;
      font-size: 1.5rem;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 30px;
      font-size: 0.85rem;
    }

    .info-box {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.85rem;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #475569;
      font-weight: 600;
    }

    .info-value {
      color: #1e293b;
      font-weight: 700;
    }

    .info-value.success {
      color: #22c55e;
    }

    .info-value.error {
      color: #ef4444;
    }

    .file-input {
      display: none;
    }

    .file-button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 15px;
      width: 100%;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .file-button:active {
      transform: scale(0.98);
    }

    .log {
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-top: 20px;
    }

    .log-entry {
      margin-bottom: 5px;
    }

    .log-entry.success {
      color: #22c55e;
    }

    .log-entry.error {
      color: #ef4444;
    }

    .log-entry.info {
      color: #3b82f6;
    }

    .log-entry.warning {
      color: #f59e0b;
    }

    .preview {
      margin-top: 15px;
      border-radius: 12px;
      overflow: hidden;
      max-height: 300px;
      display: none;
    }

    .preview img {
      width: 100%;
      height: auto;
    }

    .progress {
      background: #e2e8f0;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
      margin: 15px 0;
      display: none;
    }

    .progress-bar {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Diagnóstico de Subida</h1>
    <p class="subtitle">Herramienta para diagnosticar problemas de subida en móviles</p>

    <div class="info-box">
      <div class="info-item">
        <span class="info-label">Dispositivo</span>
        <span class="info-value" id="device">Detectando...</span>
      </div>
      <div class="info-item">
        <span class="info-label">Navegador</span>
        <span class="info-value" id="browser">Detectando...</span>
      </div>
      <div class="info-item">
        <span class="info-label">Conexión</span>
        <span class="info-value" id="connection">Detectando...</span>
      </div>
      <div class="info-item">
        <span class="info-label">File API</span>
        <span class="info-value" id="fileapi">Detectando...</span>
      </div>
      <div class="info-item">
        <span class="info-label">Canvas API</span>
        <span class="info-value" id="canvasapi">Detectando...</span>
      </div>
      <div class="info-item">
        <span class="info-label">LocalStorage</span>
        <span class="info-value" id="localstorage">Detectando...</span>
      </div>
    </div>

    <input type="file" id="fileInput" class="file-input" accept="image/*,video/*">
    <button class="file-button" onclick="document.getElementById('fileInput').click()">
      <span>📁</span>
      <span>Seleccionar Archivo de Prueba</span>
    </button>

    <div class="progress" id="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="preview" id="preview">
      <img id="previewImg" src="" alt="Preview">
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbydiLxcTF1-zNzZoEmqAhPgHuj0GqrdfKYxUmZMQmVLq9XjPz4W7429YqA6DcBxEh_Z/exec';
    
    const logEl = document.getElementById('log');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${timestamp}] ${message}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(`[${type.toUpperCase()}]`, message);
    }

    // Detectar información del dispositivo
    function detectDevice() {
      const ua = navigator.userAgent;
      let device = 'Desktop';
      
      if (/android/i.test(ua)) device = 'Android';
      else if (/iPad|iPhone|iPod/.test(ua)) device = 'iOS';
      else if (/Windows Phone/i.test(ua)) device = 'Windows Phone';
      
      document.getElementById('device').textContent = device;
      document.getElementById('device').className = 'info-value success';
      log(`Dispositivo detectado: ${device}`, 'info');
    }

    function detectBrowser() {
      const ua = navigator.userAgent;
      let browser = 'Desconocido';
      
      if (/chrome|chromium|crios/i.test(ua) && !/edg/i.test(ua)) browser = 'Chrome';
      else if (/firefox|fxios/i.test(ua)) browser = 'Firefox';
      else if (/safari/i.test(ua) && !/chrome/i.test(ua)) browser = 'Safari';
      else if (/edg/i.test(ua)) browser = 'Edge';
      else if (/opr\//i.test(ua)) browser = 'Opera';
      
      document.getElementById('browser').textContent = browser;
      document.getElementById('browser').className = 'info-value success';
      log(`Navegador detectado: ${browser}`, 'info');
    }

    function detectConnection() {
      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      let status = 'Online';
      
      if (conn) {
        status = `${conn.effectiveType || 'unknown'} (${conn.downlink || '?'}Mbps)`;
      }
      
      document.getElementById('connection').textContent = status;
      document.getElementById('connection').className = 'info-value success';
      log(`Conexión: ${status}`, 'info');
    }

    function detectAPIs() {
      // File API
      const hasFileAPI = !!(window.File && window.FileReader && window.FileList && window.Blob);
      document.getElementById('fileapi').textContent = hasFileAPI ? 'Soportado' : 'No soportado';
      document.getElementById('fileapi').className = hasFileAPI ? 'info-value success' : 'info-value error';
      log(`File API: ${hasFileAPI ? 'Soportado' : 'No soportado'}`, hasFileAPI ? 'success' : 'error');
      
      // Canvas API
      const hasCanvas = !!document.createElement('canvas').getContext;
      document.getElementById('canvasapi').textContent = hasCanvas ? 'Soportado' : 'No soportado';
      document.getElementById('canvasapi').className = hasCanvas ? 'info-value success' : 'info-value error';
      log(`Canvas API: ${hasCanvas ? 'Soportado' : 'No soportado'}`, hasCanvas ? 'success' : 'error');
      
      // LocalStorage
      let hasLocalStorage = false;
      try {
        localStorage.setItem('test', 'test');
        localStorage.removeItem('test');
        hasLocalStorage = true;
      } catch(e) {}
      document.getElementById('localstorage').textContent = hasLocalStorage ? 'Disponible' : 'No disponible';
      document.getElementById('localstorage').className = hasLocalStorage ? 'info-value success' : 'info-value error';
      log(`LocalStorage: ${hasLocalStorage ? 'Disponible' : 'No disponible'}`, hasLocalStorage ? 'success' : 'error');
    }

    // Procesar archivo seleccionado
    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      log(`Archivo seleccionado: ${file.name}`, 'info');
      log(`Tipo: ${file.type}`, 'info');
      log(`Tamaño: ${(file.size / 1024).toFixed(2)}KB`, 'info');

      // Mostrar preview si es imagen
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('previewImg').src = e.target.result;
          document.getElementById('preview').style.display = 'block';
          log('Preview generado', 'success');
        };
        reader.readAsDataURL(file);
      }

      // Probar conversión a base64
      try {
        log('Iniciando conversión a base64...', 'info');
        const fileData = await fileToBase64(file);
        log(`✓ Conversión exitosa: ${(fileData.base64.length / 1024).toFixed(2)}KB`, 'success');

        // Probar subida a GAS
        log('Iniciando subida a Google Drive...', 'info');
        document.getElementById('progress').style.display = 'block';
        
        const result = await uploadToGAS(fileData);
        
        if (result.success) {
          log(`✓ Subida exitosa!`, 'success');
          log(`URL: ${result.url}`, 'success');
          document.getElementById('progressBar').style.width = '100%';
        } else {
          log(`✗ Error en subida: ${result.message}`, 'error');
        }
      } catch (error) {
        log(`✗ Error: ${error.message}`, 'error');
      } finally {
        setTimeout(() => {
          document.getElementById('progress').style.display = 'none';
          document.getElementById('progressBar').style.width = '0%';
        }, 2000);
      }
    });

    // Función de conversión a base64 (igual que en gas.js)
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const base64 = reader.result.split(',')[1];
              resolve({
                base64,
                mimeType: file.type,
                fileName: file.name,
              });
            } catch (e) {
              reject(e);
            }
          };
          reader.onerror = () => reject(new Error('Error al leer archivo'));
          reader.readAsDataURL(file);
          return;
        }

        const img = new Image();
        const url = URL.createObjectURL(file);
        
        const timeout = setTimeout(() => {
          URL.revokeObjectURL(url);
          reject(new Error('Timeout al cargar imagen'));
        }, 30000);

        img.onload = () => {
          clearTimeout(timeout);
          URL.revokeObjectURL(url);
          
          try {
            const MAX_W = 1280;
            let w = img.width, h = img.height;
            if (w > MAX_W) { 
              h = Math.round(h * MAX_W / w); 
              w = MAX_W; 
            }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);

            const quality = w > 800 ? 0.7 : 0.8;
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            const base64 = dataUrl.split(',')[1];
            
            resolve({
              base64,
              mimeType: 'image/jpeg',
              fileName: file.name.replace(/\.[^.]+$/, '.jpg'),
            });
          } catch (e) {
            reject(e);
          }
        };
        
        img.onerror = () => {
          clearTimeout(timeout);
          URL.revokeObjectURL(url);
          reject(new Error('Error al cargar imagen'));
        };
        
        img.src = url;
      });
    }

    // Función de subida a GAS
    async function uploadToGAS(fileData) {
      const payload = {
        accion: 'SUBIR_DRIVE',
        idNovedad: 'TEST-' + Date.now(),
        hoja: 'DIAGNOSTICO',
        base64: fileData.base64,
        mimeType: fileData.mimeType,
        fileName: fileData.fileName
      };

      // Intentar ambos métodos
      let res;
      try {
        log('Intentando método 1 (text/plain)...', 'info');
        res = await fetch(GAS_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
      } catch (e) {
        log(`Método 1 falló: ${e.message}`, 'warning');
        log('Intentando método 2 (application/json)...', 'info');
        res = await fetch(GAS_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      }

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      }

      return await res.json();
    }

    // Inicializar
    detectDevice();
    detectBrowser();
    detectConnection();
    detectAPIs();
    log('Diagnóstico iniciado. Selecciona un archivo para probar la subida.', 'info');
  </script>
</body>
</html>
