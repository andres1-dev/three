<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIESA - Delivery</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs/dist/theme/mermaid.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid p-4">
        <div class="header mb-4">
            <div class="d-flex align-items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 128 131" class="me-3">
                    <path fill="#0D79FE" d="M54.0885 77.4585C52.9804 77.5151 51.5096 77.816 50.8263 76.8696C51.1423 75.4882 61.1996 65.7501 62.8917 64.0589L80.8212 46.1482C95.6043 31.2335 110.49 16.4207 125.476 1.71068C125.971 43.6277 125.206 85.8427 125.589 127.802C122.752 127.306 112.019 127.497 108.572 127.498L74.8898 127.501C80.1007 120.665 124.094 78.9847 124.522 77.4939L124.033 77.3323C122.197 76.7636 113.63 76.9482 111.19 76.9423L76.9975 77.1301C73.1869 77.1448 56.6551 76.5777 54.0885 77.4585Z"/>
                    <path fill="#0D79FE" fill-opacity="0.96470588" d="M54.0885 77.4585C56.6551 76.5777 73.1869 77.1448 76.9975 77.1301L111.19 76.9423C113.63 76.9482 122.197 76.7636 124.033 77.3323C121.874 77.6516 117.402 77.5376 115.066 77.536L99.4406 77.5235L70.3998 77.5303C65.1988 77.5305 59.2301 77.6573 54.0885 77.4585Z"/>
                    <path fill="#0D79FE" d="M0 2.17052C13.6376 2.42363 27.7398 2.20769 41.4404 2.22138C52.2739 2.2322 64.4626 2.4734 75.2426 2.10371C73.2957 4.7616 69.3827 8.62415 67.0259 10.9976L54.8423 23.1794L14.7953 63.1608C11.4804 66.4573 8.14266 69.7306 4.78223 72.9806C3.85777 73.8727 0.534885 76.9225 0 77.6905C2.62525 76.8567 12.0471 77.2657 15.4544 77.1869C26.7037 76.9267 38.852 77.5799 50.0359 77.1352C44.8505 83.2294 39.74 88.2326 34.0686 93.8928L15.0791 112.822L5.36868 122.553C4.42993 123.492 0.973236 126.999 0 127.632L0 2.17052Z"/>
                </svg>
                <div>
                    <h1 class="mb-0">SIESA Delivery</h1>
                    <p class="text-muted mb-0 small">Seguimiento de facturas y entregas</p>
                </div>
            </div>
            <div>
                <input type="text" id="dateRange" class="form-control" placeholder="Seleccionar rango de fechas" style="width: 300px;">
            </div>
        </div>

        <div class="filtros mb-3">
            <div class="row g-2">
                <div class="col-md-2">
                    <label class="form-label">Cliente</label>
                    <select id="filtroCliente" class="form-select form-select-sm">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Proveedor</label>
                    <select id="filtroProveedor" class="form-select form-select-sm">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Estado</label>
                    <select id="filtroEstado" class="form-select form-select-sm">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Tipo</label>
                    <select id="filtroTipo" class="form-select form-select-sm">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Confirmación</label>
                    <select id="filtroConfirmacion" class="form-select form-select-sm">
                        <option value="">Todos</option>
                        <option value="ENTREGADO">ENTREGADO</option>
                        <option value="PENDIENTE">PENDIENTE</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button id="btnLimpiarFiltros" class="btn btn-secondary btn-sm w-100">
                        <i class="fas fa-times me-1"></i>Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Botón flotante para filtros en móvil -->
        <button id="btnFiltrosMobile" class="btn-filtros-mobile d-lg-none">
            <i class="fas fa-filter"></i>
        </button>

        <div class="card">
            <div class="card-body">
                <!-- Vista de tabla para desktop -->
                <div id="deliveryTable" class="d-none d-lg-block"></div>
                
                <!-- Vista de tarjetas para móvil -->
                <div id="deliveryCards" class="d-lg-none"></div>
            </div>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gridjs/dist/gridjs.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    
    <script src="../js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
